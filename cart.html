<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Essence Haven</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #0F0F0F; --secondary-bg: #111111;
            --accent-gold: #D4AF37; --text-light: #FFFFFF;
            --text-muted: #A0A0A0; --font-heading: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background-color: var(--primary-bg); color: var(--text-light); }
        a { text-decoration: none; color: inherit; }

        header { padding: 20px; background: rgba(15, 15, 15, 0.95); border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-heading); font-size: 24px; color: var(--accent-gold); letter-spacing: 2px; }

        .cart-wrapper { max-width: 1200px; margin: 60px auto; padding: 0 20px; display: flex; gap: 40px; flex-wrap: wrap; }
        
        /* Left Column: Items */
        .cart-items-section { flex: 2; min-width: 300px; }
        .cart-items-section h1 { font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-details { display: flex; align-items: center; gap: 20px; }
        .item-image { width: 100px; height: 100px; object-fit: cover; border: 1px solid rgba(212, 175, 55, 0.2); }
        .item-name { font-family: var(--font-heading); font-size: 1.2rem; margin-bottom: 5px; }
        .item-price { color: var(--accent-gold); }
        
        .quantity-controls { display: flex; align-items: center; border: 1px solid var(--text-muted); }
        .qty-btn { background: transparent; color: var(--text-light); border: none; padding: 5px 15px; cursor: pointer; font-size: 1.2rem; }
        .qty-input { width: 40px; text-align: center; background: transparent; color: var(--text-light); border: none; font-family: var(--font-body); }
        
        .remove-btn { background: transparent; border: none; color: #ff4d4d; cursor: pointer; font-size: 0.9rem; text-decoration: underline; margin-left: 20px; }

        /* Right Column: Summary */
        .order-summary { flex: 1; min-width: 300px; background: var(--secondary-bg); padding: 30px; border: 1px solid rgba(212, 175, 55, 0.2); height: fit-content; }
        .order-summary h2 { font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 20px; }
        
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-muted); }
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 1.3rem; font-weight: 600; color: var(--accent-gold); }
        
        .checkout-btn { width: 100%; background: var(--accent-gold); color: #000; border: none; padding: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 30px; cursor: pointer; transition: 0.3s; }
        .checkout-btn:hover { background: #b5952f; }

        .empty-cart { display: none; text-align: center; padding: 50px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ESSENCE HAVEN</a>
        <a href="shop.html" style="color: var(--text-light); text-decoration: none; text-transform: uppercase; font-size: 14px;">Continue Shopping</a>
    </header>

    <div class="cart-wrapper">
        <div class="cart-items-section">
            <h1>Shopping Cart</h1>
            
            <div id="cart-container">
                <div class="cart-item" data-price="4500">
                    <div class="item-details">
                        <img src="https://images.unsplash.com/photo-1590736704728-f4730bb30770?auto=format&fit=crop&w=200&q=80" alt="Midnight Oud" class="item-image">
                        <div>
                            <div class="item-name">Midnight Oud</div>
                            <div class="item-price">₹4,500</div>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQty(this, -1)">-</button>
                            <input type="text" class="qty-input" value="1" readonly>
                            <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeItem(this)">Remove</button>
                    </div>
                </div>

                <div class="cart-item" data-price="3200">
                    <div class="item-details">
                        <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=200&q=80" alt="Velvet Rose" class="item-image">
                        <div>
                            <div class="item-name">Velvet Rose</div>
                            <div class="item-price">₹3,200</div>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQty(this, -1)">-</button>
                            <input type="text" class="qty-input" value="1" readonly>
                            <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeItem(this)">Remove</button>
                    </div>
                </div>
            </div>

            <div class="empty-cart" id="empty-message">
                <h2>Your cart is empty.</h2>
                <br>
                <a href="shop.html" style="color: var(--accent-gold); text-decoration: underline;">Discover our collections</a>
            </div>
        </div>

        <div class="order-summary" id="summary-card">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">₹7,700</span>
            </div>
            <div class="summary-row">
                <span>Shipping (Premium)</span>
                <span>₹250</span>
            </div>
            <div class="summary-row">
                <span>Tax (GST 18%)</span>
                <span id="tax">₹1,386</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="grand-total">₹9,336</span>
            </div>
            <button class="checkout-btn" onclick="alert('Proceeding to secure payment gateway...')">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        const shipping = 250;
        const taxRate = 0.18;

        // Function to update item quantity
        function updateQty(btn, change) {
            const input = btn.parentElement.querySelector('.qty-input');
            let currentQty = parseInt(input.value);
            
            if (currentQty + change >= 1) {
                input.value = currentQty + change;
                calculateTotals();
            }
        }

        // Function to remove an item entirely
        function removeItem(btn) {
            const item = btn.closest('.cart-item');
            item.remove();
            calculateTotals();
            checkEmptyCart();
        }

        // Function to recalculate the cart math dynamically
        function calculateTotals() {
            const items = document.querySelectorAll('.cart-item');
            let subtotal = 0;

            items.forEach(item => {
                const price = parseFloat(item.getAttribute('data-price'));
                const qty = parseInt(item.querySelector('.qty-input').value);
                subtotal += (price * qty);
            });

            const tax = subtotal * taxRate;
            const grandTotal = subtotal > 0 ? subtotal + shipping + tax : 0;

            // Format numbers to Indian Rupees style and update DOM
            document.getElementById('subtotal').innerText = '₹' + subtotal.toLocaleString('en-IN');
            document.getElementById('tax').innerText = '₹' + Math.round(tax).toLocaleString('en-IN');
            
            if (subtotal > 0) {
                document.getElementById('grand-total').innerText = '₹' + Math.round(grandTotal).toLocaleString('en-IN');
            } else {
                document.getElementById('grand-total').innerText = '₹0';
            }
        }

        // Hide summary if cart is empty
        function checkEmptyCart() {
            const items = document.querySelectorAll('.cart-item');
            if (items.length === 0) {
                document.getElementById('cart-container').style.display = 'none';
                document.getElementById('summary-card').style.display = 'none';
                document.getElementById('empty-message').style.display = 'block';
            }
        }
    </script>
</body>
</html>
